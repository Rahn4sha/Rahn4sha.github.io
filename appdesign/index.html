<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studysync</title>
    <link rel="shortcut icon" href="img/favicon.png" type="">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300..700;1,300..700&family=Dai+Banna+SIL:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.1/aos.css"
        integrity="sha512-1cK78a1o+ht2JcaW6g8OXYwqpev9+6GqOkz9xmBN9iUUhIndKtxwILGWYOSibOKjLsEdjyjZvYDq/cZwNeak0w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="studysync">
        <div class="container">
            <div class="row g-0">
                <div class="head">
                    <div class="col-md-12">
                        <h1>StudySync App Design</h1>
                    </div>
                </div>
                <div class="col-md-12" data-aos="fade-down" data-aos-easing="linear" data-aos-duration="1200">
                    <div class="intro">
                        <img src="img/appintro.png" alt="" width="100%">
                    </div>
                </div>
                <div class="col-md-12" data-aos="fade-down" data-aos-easing="linear" data-aos-duration="1200">
                    <div class="features">
                        <img src="img/appfeatures.png" alt="" width="100%">
                    </div>
                </div>
                <div class="col-md-12" data-aos="fade-down" data-aos-easing="linear" data-aos-duration="1200">
                    <div class="focusscreens">
                        <img src="img/focusmode.png" alt="" width="100%">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>


</html>
